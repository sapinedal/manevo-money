<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="100%" stop-color="#18181b" />
    </linearGradient>
    
    <!-- Neon Green Accent Gradient -->
    <linearGradient id="greenGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00a870" />
      <stop offset="60%" stop-color="#00f2a1" />
      <stop offset="100%" stop-color="#55ffd0" />
    </linearGradient>

    <!-- Dark Green Shadow Gradient -->
    <linearGradient id="darkGreenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#042f1d" />
      <stop offset="100%" stop-color="#084f32" />
    </linearGradient>
    
    <!-- Premium Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background rounded card -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <rect width="500" height="500" x="6" y="6" rx="122" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="6" />

  <!-- Emblem Group with Shadow and Main Wave -->
  <g filter="url(#glow)">
    <!-- Back Shadow Wave (Offset) -->
    <path d="M 160 360 L 225 180 L 256 245 L 287 180 L 352 360" 
          fill="none" 
          stroke="url(#darkGreenGrad)" 
          stroke-width="48" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          transform="translate(10, 10)" />

    <!-- Front Wave (Neon Green) -->
    <path d="M 160 360 L 225 180 L 256 245 L 287 180 L 352 360" 
          fill="none" 
          stroke="url(#greenGrad)" 
          stroke-width="48" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
  </g>
</svg>
