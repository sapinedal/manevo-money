server {
    listen 3000;
    server_name localhost;
    root /usr/share/nginx/html;

    location / {
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for the service worker so browser always gets updates
    location /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }

    # Disable caching for manifest to allow quick icon/name changes
    location /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        expires off;
    }

    # Enable aggressive caching for build assets since their names are hashed
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
